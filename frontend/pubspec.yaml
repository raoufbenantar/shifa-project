name: shifa
description: Shifa – Medical appointment & records app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── BLoC state management ─────────────────
  # WHY flutter_bloc?
  # Enforces strict Event→State one-way data flow.
  # Pairs with BlocProvider for dependency injection
  # and BlocConsumer for side-effects (navigation,
  # SnackBars) + UI rebuilds in one widget.
  flutter_bloc: ^8.1.4

  # ── Google Fonts ──────────────────────────
  # Figma uses "Inter" throughout.
  google_fonts: ^6.1.0

  # ── HTTP ──────────────────────────────────
  # For the real API calls when mock is replaced.
  http: ^1.2.0

  # ── Shared Preferences ────────────────────
  # Persist JWT token and role after login.
  shared_preferences: ^2.2.2

  # ── WebSocket ─────────────────────────────
  # Real-time messaging for the chat feature.
  web_socket_channel: ^2.4.0

  # ── Firebase (Push Notifications) ─────────
  # Uncomment and configure for push notifications:
  # 1. Add google-services.json to android/app/
  # 2. Add GoogleService-Info.plist to ios/Runner/
  # 3. Run: flutter pub get
  # firebase_core: ^3.12.0
  # firebase_messaging: ^15.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # BLoC testing utility
  bloc_test: ^9.1.5

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/
